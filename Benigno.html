<title>Galería dinámica</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    padding: 10px;
}

@media (max-width: 900px) {
    .gallery {
        grid-template-columns: repeat(2, 1fr);
    }
}

.gallery-item {
    background: white;
    padding: 5px;
    text-align: center;
    border-radius: 8px;
    overflow: hidden;
}

.gallery img {
    width: 100%;
    height: 220px;
    object-fit: cover;
    border-radius: 8px;
    transition: transform 0.3s;
    object-fit: contain;
    background: #ddd;   
}
.gallery img:hover {
    transform: scale(1.05);
}

.caption {
    margin-top: 5px;
    font-size: 14px;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    z-index: 1000;
    padding-top: 50px;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.9);
    text-align: center;
}

.modal img {
    width: 100vw;
    height: 85vh;
}

#modalCaption {
    position: absolute;
    bottom: 0;
    width: 100%;
    color: white;
    padding: 15px;
    text-align: center;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.close, .prev, .next {
    position: absolute;
    color: white;
    font-size: 30px;
    cursor: pointer;
}

.close { top: 20px; right: 30px; }
.prev { top: 50%; left: 20px; font-size: 40px; }
.next { top: 50%; right: 20px; font-size: 40px; }

</style>
</head>

.menu {

// GENERAR GALERÍA
const gallery = document.getElementById("gallery");

galleryData.forEach((item, index) => {
    gallery.innerHTML += `
        <div class="gallery-item">
            <img src="${item.src}" onclick="openModal(${index})">
            <div class="caption">${item.caption}</div>
        </div>
    `;
});

// MODAL
let currentIndex = 0;

function openModal(index) {
    currentIndex = index;
    document.getElementById("modal").style.display = "block";
    showImage();
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function changeSlide(direction) {
    currentIndex += direction;

    if (currentIndex >= galleryData.length) currentIndex = 0;
    if (currentIndex < 0) currentIndex = galleryData.length - 1;

    showImage();
}

function showImage() {
    const modalImg = document.getElementById("modalImg");
    const caption = document.getElementById("modalCaption");

    modalImg.src = galleryData[currentIndex].src;
    caption.innerText = galleryData[currentIndex].caption;

    modalImg.onload = function () {
        if (modalImg.naturalHeight > modalImg.naturalWidth) {
            modalImg.style.objectFit = "contain"; // vertical sin recorte
        } else {
            modalImg.style.objectFit = "contain";   // horizontal pantalla completa
        }
    };
}

// ESC para cerrar
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") closeModal();
});
